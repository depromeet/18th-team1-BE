services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: firstpenguin-api-local
    container_name: firstpenguin-api-local
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:17
    container_name: firstpenguin-db-local
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres-data-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data-local:
