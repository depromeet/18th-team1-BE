spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/changeme}
    username: ${DB_USER:changeme}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jooq:
    sql-dialect: postgres

  flyway:
    enabled: false

auth:
  jwt:
    secret: test-jwt-secret

openai:
  api-key: test-openai-api-key

batch:
  admin-secret: test-admin-batch-secret

cloud:
  provider: none

gcs:
  bucket-name: test-bucket
  base-url: https://storage.googleapis.com/test-bucket
