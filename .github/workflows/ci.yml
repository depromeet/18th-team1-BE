name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    name: 코드 스타일 검사
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Flyway 마이그레이션 버전 중복 검사
        working-directory: .
        run: |
          duplicates=$(find app/src/main/resources/db/migration -maxdepth 1 -name 'V*.sql' \
            -exec basename {} \; \
            | sed -E 's/^V([0-9]+)__.*/\1/' \
            | sort \
            | uniq -d)

          if [ -n "$duplicates" ]; then
            echo "Flyway 마이그레이션 버전 중복:"
            echo "$duplicates"
            exit 1
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew lintKotlin

      - name: detekt
        run: ./gradlew detekt

  test:
    name: 테스트 및 커버리지
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      - name: 테스트 DB 실행
        run: |
          cp ../.env.example ../.env
          docker compose -f ../docker-compose-local.yml up -d --wait db

      - name: 테스트
        run: ./gradlew test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/changeme
          DB_USER: changeme
          DB_PASSWORD: changeme

      - name: 커버리지 검증
        run: ./gradlew koverVerify
        env:
          DB_URL: jdbc:postgresql://localhost:5432/changeme
          DB_USER: changeme
          DB_PASSWORD: changeme
