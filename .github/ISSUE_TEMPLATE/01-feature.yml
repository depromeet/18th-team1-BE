name: "\u2728 Feature"
description: 새로운 기능이나 기능 개선 작업을 작성합니다.
title: "[Feature] "
labels:
  - feature
body:
  - type: textarea
    id: background
    attributes:
      label: 배경 / 문제
      description: 왜 이 기능이 필요한지, 현재 어떤 불편이 있는지 작성해주세요.
      placeholder: 예) 현재 매칭 결과 정렬 기준이 고정되어 있어 사용자가 원하는 조건으로 탐색하기 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 구현 내용
      description: 추가하거나 개선하려는 기능을 구체적으로 작성해주세요.
      placeholder: 예) 최신순, 매너점수순, 거리순 정렬 옵션을 추가합니다.
    validations:
      required: true

  - type: textarea
    id: benefit
    attributes:
      label: 기대 효과
      description: 이 기능이 사용자나 운영 측면에서 어떤 가치를 주는지 작성해주세요.
      placeholder: 예) 사용자가 원하는 방을 더 빠르게 찾을 수 있고, 탐색 이탈률을 줄일 수 있습니다.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 영향 범위
      description: 관련 도메인, API, DB, 프론트 연동 포인트 등을 작성해주세요.
      placeholder: |
        - Domain:
        - API:
        - DB:
        - Client:

  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      description: 가장 가까운 유형을 선택해주세요.
      options:
        - 새로운 기능
        - 기존 기능 개선
        - 문서화
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 기획 문서, 디자인, 관련 이슈, API 명세 등이 있다면 첨부해주세요.
      placeholder: 예) 관련 PR, 피그마 링크, 노션 문서, 기존 이슈 번호

  - type: checkboxes
    id: checklist
    attributes:
      label: 체크리스트
      options:
        - label: 중복 이슈가 없는지 확인했습니다.
          required: true
        - label: 문제와 기대 효과를 명확히 작성했습니다.
          required: true
